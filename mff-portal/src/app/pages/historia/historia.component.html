<div class="pagina-container">
  <header class="pagina-header">
    <h1>A Trajetória do Museu</h1>
    <p>Conheça os marcos que transformaram os jardins do ICMC em um museu a céu aberto.</p>
  </header>

  <div class="timeline">
    @for (evento of eventos(); track $index; let i = $index) {
      <div class="timeline-container" [ngClass]="{ 'direita': i % 2 !== 0, 'esquerda': i % 2 === 0 }">

        <ng-template #cardContent>
          <h2>{{ evento.titulo }}</h2>
          <small class="data">{{ evento.ano }}</small>
          <p>{{ evento.descricao }}</p>

          @if (evento.imagem) {
            <img
              [src]="evento.imagem"
              [alt]="evento.titulo"
              class="evento-imagem"
              loading="lazy"> }
        </ng-template>

        @if (evento.link) {
          <a [href]="evento.link" target="_blank" rel="noopener noreferrer" class="timeline-content-link">
            <div class="timeline-content">
              <ng-container *ngTemplateOutlet="cardContent"></ng-container>
            </div>
          </a>
        } @else {
          <div class="timeline-content">
            <ng-container *ngTemplateOutlet="cardContent"></ng-container>
          </div>
        }

      </div>
    }
  </div>
</div>
